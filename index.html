<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🚗</text></svg>"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3ec6f0" />
    <meta
      name="description"
      content="Parking Pinball 3D — launch toy cars through pinball parking lots, bounce off bumpers, collect coins, and slide into the perfect park!"
    />
    <meta property="og:title" content="Parking Pinball 3D" />
    <meta
      property="og:description"
      content="Launch it. Bounce it. Park it. A tiny 3D arcade game — play it in your browser."
    />
    <meta property="og:type" content="website" />
    <title>Parking Pinball 3D</title>

    <!--
      YouTube Playables SDK. MUST load before any game code — it defines the
      global `ytgame` namespace. Served outside YouTube this 404s or no-ops,
      so all usage is guarded (see src/core/Playables.ts).
    -->
    <script src="https://www.youtube.com/game_api/v1"></script>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
